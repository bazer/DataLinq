name: Benchmark History

on:
  push:
    branches: ["master"]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: benchmark-history
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BENCHMARK_PROFILE: ${{ github.event_name == 'schedule' && 'heavy' || 'default' }}

jobs:
  benchmark-history:
    name: Benchmark History
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
      DATALINQ_BENCHMARK_PROVIDERS: sqlite-memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore benchmark CLI
        run: dotnet restore src/DataLinq.Benchmark.CLI/DataLinq.Benchmark.CLI.csproj -p:NuGetAudit=false

      - name: Build benchmark CLI
        run: dotnet build src/DataLinq.Benchmark.CLI/DataLinq.Benchmark.CLI.csproj -c Release --no-restore -p:NuGetAudit=false

      - name: Prepare benchmark data worktree
        shell: bash
        run: |
          git fetch origin benchmark-data || true

          if git show-ref --verify --quiet refs/remotes/origin/benchmark-data; then
            git worktree add benchmark-data-worktree refs/remotes/origin/benchmark-data
          else
            git worktree add --detach benchmark-data-worktree
            pushd benchmark-data-worktree
            git switch --orphan benchmark-data
            git rm -rf . > /dev/null 2>&1 || true
            popd
          fi

      - name: Run published benchmark subset
        shell: bash
        run: |
          mkdir -p artifacts/benchmarks/ci

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          profile = os.environ.get("BENCHMARK_PROFILE", "default")
          history_path = Path("benchmark-data-worktree/benchmarks/history.json")
          baseline_path = Path("artifacts/benchmarks/ci/baseline-same-profile.json")

          if history_path.exists():
              history = json.loads(history_path.read_text(encoding="utf-8"))
              candidates = [
                  run for run in history.get("Runs", [])
                  if (run.get("Metadata") or {}).get("Profile", "default") == profile
              ]
              if candidates:
                  baseline_path.write_text(json.dumps(candidates[-1], indent=2) + "\n", encoding="utf-8")
          PY

          baseline_args=()
          if [ -f artifacts/benchmarks/ci/baseline-same-profile.json ]; then
            baseline_args+=(--baseline artifacts/benchmarks/ci/baseline-same-profile.json)
            baseline_args+=(--comparison-json artifacts/benchmarks/ci/latest-comparison.json)
          fi

          dotnet exec src/DataLinq.Benchmark.CLI/bin/Release/net8.0/DataLinq.Benchmark.CLI.dll run \
            --profile "${BENCHMARK_PROFILE}" \
            --filter "*EmployeesBenchmarks*" \
            --history-json artifacts/benchmarks/ci/latest-history.json \
            "${baseline_args[@]}" \
            -- --anyCategories stable macro-readwrite macro-bulk

      - name: Update published benchmark history
        if: success() && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          git fetch origin benchmark-data || true
          if git show-ref --verify --quiet refs/remotes/origin/benchmark-data; then
            pushd benchmark-data-worktree
            git reset --hard refs/remotes/origin/benchmark-data
            popd
          fi

          python - <<'PY'
          import json
          import shutil
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          latest_run_path = Path("artifacts/benchmarks/ci/latest-history.json")
          comparison_path = Path("artifacts/benchmarks/ci/latest-comparison.json")

          if not latest_run_path.exists():
              raise SystemExit("Missing latest benchmark history artifact.")

          latest_run = json.loads(latest_run_path.read_text(encoding="utf-8"))

          data_root = Path("benchmark-data-worktree/benchmarks")
          runs_root = data_root / "runs"
          data_root.mkdir(parents=True, exist_ok=True)
          runs_root.mkdir(parents=True, exist_ok=True)

          history_path = data_root / "history.json"
          if history_path.exists():
              history = json.loads(history_path.read_text(encoding="utf-8"))
          else:
              history = {
                  "SchemaVersion": 1,
                  "GeneratedAtUtc": latest_run["GeneratedAtUtc"],
                  "Runs": []
              }

          runs = [run for run in history.get("Runs", []) if run.get("RunId") != latest_run.get("RunId")]
          runs.append(latest_run)
          runs.sort(key=lambda run: run.get("GeneratedAtUtc", ""))

          def parse_utc(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(value.replace("Z", "+00:00"))
              except ValueError:
                  return None

          latest_at = parse_utc(latest_run.get("GeneratedAtUtc")) or datetime.now(timezone.utc)
          recent_cutoff = latest_at - timedelta(days=183)
          weekly_cutoff = latest_at - timedelta(days=730)
          retained = []
          thinned = {}

          for run in runs:
              generated_at = parse_utc(run.get("GeneratedAtUtc"))
              if generated_at is None:
                  retained.append(run)
                  continue

              if generated_at >= recent_cutoff:
                  retained.append(run)
                  continue

              profile = (run.get("Metadata") or {}).get("Profile", "default")
              if generated_at >= weekly_cutoff:
                  iso_year, iso_week, _ = generated_at.isocalendar()
                  key = ("week", profile, iso_year, iso_week)
              else:
                  key = ("month", profile, generated_at.year, generated_at.month)

              thinned[key] = run

          by_run_id = {}
          for run in retained + list(thinned.values()):
              by_run_id[run.get("RunId") or f"anonymous-{len(by_run_id)}"] = run

          runs = sorted(by_run_id.values(), key=lambda run: run.get("GeneratedAtUtc", ""))

          history["SchemaVersion"] = 2
          history["GeneratedAtUtc"] = latest_run["GeneratedAtUtc"]
          history["Runs"] = runs

          history_path.write_text(json.dumps(history, indent=2) + "\n", encoding="utf-8")
          (data_root / "latest.json").write_text(json.dumps(latest_run, indent=2) + "\n", encoding="utf-8")

          run_file_name = f"{latest_run['GeneratedAtUtc'].replace(':', '').replace('-', '')}-{latest_run['RunId']}.json"
          (runs_root / run_file_name).write_text(json.dumps(latest_run, indent=2) + "\n", encoding="utf-8")

          if comparison_path.exists():
              shutil.copyfile(comparison_path, data_root / "latest-comparison.json")
          PY

      - name: Publish benchmark history branch
        if: success() && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pushd benchmark-data-worktree
          git add benchmarks
          if git diff --cached --quiet; then
            echo "No benchmark history changes to push."
            popd
            exit 0
          fi

          git commit -m "Update benchmark history [skip ci]"
          git push origin HEAD:benchmark-data
          popd

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-history
          path: artifacts/benchmarks
          if-no-files-found: ignore
