name: Test

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  latest:
    name: Latest Lane
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Show Podman version
        run: podman --version

      - name: Restore solution
        run: dotnet restore src/DataLinq.sln

      - name: Build solution
        run: dotnet build src/DataLinq.sln -c Debug --no-restore

      - name: Validate parity manifest
        run: dotnet exec src/DataLinq.Testing.CLI/bin/Debug/net10.0/DataLinq.Testing.CLI.dll validate-parity

      - name: Run latest suite set
        run: dotnet exec src/DataLinq.Testing.CLI/bin/Debug/net10.0/DataLinq.Testing.CLI.dll run --suite all --alias latest --batch-size 4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-test-results
          path: TestResults
          if-no-files-found: ignore

  detect-nightly-activity:
    name: Detect Nightly Activity
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      commit_count: ${{ steps.detect.outputs.commit_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect recent commits
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "commit_count=manual" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_count=$(git rev-list --count --since="30 hours ago" HEAD)
          echo "commit_count=$commit_count" >> "$GITHUB_OUTPUT"
          if [ "$commit_count" -gt 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Nightly decision
        run: echo "Recent commit count in the nightly window: ${{ steps.detect.outputs.commit_count }}"

  full-matrix:
    name: Full Matrix Nightly
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && needs.detect-nightly-activity.outputs.should_run == 'true')
    needs: [detect-nightly-activity]
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Show Podman version
        run: podman --version

      - name: Restore solution
        run: dotnet restore src/DataLinq.sln

      - name: Build solution
        run: dotnet build src/DataLinq.sln -c Debug --no-restore

      - name: Validate parity manifest
        run: dotnet exec src/DataLinq.Testing.CLI/bin/Debug/net10.0/DataLinq.Testing.CLI.dll validate-parity

      - name: Run full matrix suite set
        run: dotnet exec src/DataLinq.Testing.CLI/bin/Debug/net10.0/DataLinq.Testing.CLI.dll run --suite all --alias all --batch-size 2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-test-results
          path: TestResults
          if-no-files-found: ignore
